<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <title>科目担当画面</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 16px;
      font-family: sans-serif;
      background: #f5f7fb;
      color: #222;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }

    .page-header {
      margin-bottom: 16px;
    }

    .sub-text {
      color: #666;
      font-size: 14px;
      margin-bottom: 8px;
    }

    .message {
      min-height: 24px;
      margin: 8px 0 16px;
      padding: 10px 12px;
      border-radius: 8px;
      background: #eef3ff;
      color: #1f3c88;
      font-size: 14px;
      display: none;
    }

    .message.show {
      display: block;
    }

    .message.success {
      background: #e8f7ec;
      color: #1d6b37;
    }

    .message.error {
      background: #fdecec;
      color: #a12622;
    }

    .message.warn {
      background: #fff4db;
      color: #8a5a00;
    }

    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 16px;
      align-items: start;
    }

    .panel {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    .panel h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .class-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .class-card {
      border: 1px solid #d9e0ee;
      border-radius: 10px;
      padding: 12px;
      background: #fff;
      cursor: pointer;
      transition: 0.15s;
    }

    .class-card:hover {
      background: #f8fbff;
      border-color: #9db7ef;
    }

    .class-card.active {
      border: 2px solid #2f6feb;
      background: #eef4ff;
    }

    .class-card-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
      align-items: center;
    }

    .period-badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      background: #e9eefb;
      color: #31456a;
      font-size: 12px;
      font-weight: bold;
    }

    .class-status {
      font-size: 12px;
      font-weight: bold;
      color: #666;
    }

    .class-status.saved {
      color: #1d6b37;
    }

    .class-title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .class-meta {
      font-size: 13px;
      color: #666;
      line-height: 1.6;
    }

    .info-bar {
      border: 1px solid #d9e0ee;
      border-radius: 10px;
      background: #f8fbff;
      padding: 12px;
      margin-bottom: 12px;
      line-height: 1.8;
    }

    .summary {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .summary-item {
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: bold;
      background: #eef2f7;
      color: #334;
    }

    .summary-item.present {
      background: #e8f7ec;
      color: #1d6b37;
    }

    .summary-item.absent {
      background: #fdecec;
      color: #a12622;
    }

    .summary-item.late {
      background: #fff4db;
      color: #8a5a00;
    }

    .summary-item.official {
      background: #e7f0ff;
      color: #1f4fa3;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
    }

    th, td {
      border-bottom: 1px solid #e5e9f2;
      padding: 10px 8px;
      text-align: left;
      vertical-align: middle;
    }

    th {
      background: #f7f9fc;
      font-size: 14px;
    }

    td {
      font-size: 14px;
    }

    .student-name {
      font-weight: 600;
    }

    .status-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .status-btn {
      border: 1px solid #ccd5e3;
      background: #fff;
      color: #333;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 13px;
      cursor: pointer;
      transition: 0.15s;
    }

    .status-btn:hover {
      background: #f4f7fb;
    }

    .status-btn.active-present {
      background: #e8f7ec;
      border-color: #8fd1a3;
      color: #1d6b37;
      font-weight: bold;
    }

    .status-btn.active-absent {
      background: #fdecec;
      border-color: #e3a6a6;
      color: #a12622;
      font-weight: bold;
    }

    .status-btn.active-late {
      background: #fff4db;
      border-color: #e1c36c;
      color: #8a5a00;
      font-weight: bold;
    }

    .status-btn.active-official {
      background: #e7f0ff;
      border-color: #98b7ef;
      color: #1f4fa3;
      font-weight: bold;
    }

    .action-bar {
      margin-top: 16px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button.main-btn {
      border: none;
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }

    .save-btn {
      background: #2f6feb;
      color: #fff;
    }

    .save-btn:disabled {
      background: #a9bfdc;
      cursor: not-allowed;
    }

    .secondary-btn {
      background: #eef2f7;
      color: #334;
    }

    .empty-box {
      padding: 20px;
      border: 1px dashed #ccd5e3;
      border-radius: 10px;
      background: #fafcff;
      color: #667;
    }

    .save-state {
      font-size: 13px;
      color: #666;
      margin-top: 8px;
    }

    .top-action-bar {
  margin-top: 0;
  margin-bottom: 12px;
}

.bottom-action-bar {
  margin-top: 16px;
}

.save-state {
  font-size: 13px;
  color: #666;
  margin-top: 4px;
  margin-bottom: 12px;
}

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page-header">
    <h1>科目担当画面</h1>
    <div class="sub-text" id="pageSubText">読み込み中...</div>
    <div id="messageArea" class="message"></div>
  </div>

  <div class="layout">
    <div class="panel">
      <h2>本日の担当授業</h2>
      <div id="classListArea" class="class-list">
        <div class="empty-box">授業情報を読み込み中...</div>
      </div>
    </div>

    <div class="panel">
      <h2>出席入力</h2>
   <div id="selectedClassInfo" class="info-bar">授業を読み込み中...</div>

<div class="action-bar top-action-bar">
  <button id="resetPresentButton" type="button" class="main-btn secondary-btn">全員を出席にする</button>
  <button id="saveButtonTop" type="button" class="main-btn save-btn" disabled>保存する</button>
</div>

<div id="saveState" class="save-state"></div>

<div id="summaryArea" class="summary"></div>

<div id="studentArea">
  <div class="empty-box">学生一覧を読み込み中...</div>
</div>

<div class="action-bar bottom-action-bar">
  <button id="saveButtonBottom" type="button" class="main-btn save-btn" disabled>保存する</button>
</div>
    </div>
  </div>

  <script>
    const preSelectedSession = {
      classId: "<?= classId ?>",
      date: "<?= date ?>",
      period: "<?= period ?>"
    };

   const STATUS_OPTIONS = [
  { code: "", label: "出席", className: "present" },
  { code: "A", label: "欠席", className: "absent" },
  { code: "L", label: "遅刻", className: "late" },
  { code: "O", label: "公欠", className: "official" }
];

    let classesCache = [];
    let selectedClass = null;
    let studentsCache = [];
    let attendanceState = {};
    let isDirty = false;
    let isSaving = false;
    let savedSessionKeys = {};
    let studentsByClassCache = {};
let attendanceMapCache = {};


    function getSessionKey(cls) {
      return [cls.classId, cls.date, cls.period].join("__");
    }

    function showMessage(text, type) {
      const el = document.getElementById("messageArea");
      el.textContent = text;
      el.className = "message show";
      if (type) {
        el.classList.add(type);
      }
    }

    function clearMessage() {
      const el = document.getElementById("messageArea");
      el.textContent = "";
      el.className = "message";
    }

    function setSaveStateText(text) {
      document.getElementById("saveState").textContent = text || "";
    }

    function setSaveButtonsDisabled(disabled) {
  const topBtn = document.getElementById("saveButtonTop");
  const bottomBtn = document.getElementById("saveButtonBottom");

  if (topBtn) topBtn.disabled = disabled;
  if (bottomBtn) bottomBtn.disabled = disabled;
}

function markDirty(flag) {
  isDirty = flag;

  if (isSaving) {
    setSaveButtonsDisabled(true);
    return;
  }

  setSaveButtonsDisabled(!selectedClass);

  if (flag) {
    setSaveStateText("未保存の変更があります");
  }
}

    function escapeHtml(str) {
      if (str == null) return "";
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function renderPageSubText() {
      document.getElementById("pageSubText").textContent = "担当授業を選択して出席を入力してください。";
    }

    function renderClassList() {
      const area = document.getElementById("classListArea");

      if (!classesCache || classesCache.length === 0) {
        area.innerHTML = '<div class="empty-box">今日の授業はありません。</div>';
        return;
      }

      let html = "";

      classesCache.forEach(function(cls) {
        const key = getSessionKey(cls);
        const activeClass = selectedClass && key === getSessionKey(selectedClass);
        const isSaved = !!savedSessionKeys[key];

        html += '<div class="class-card' + (activeClass ? ' active' : '') + '" data-session-key="' + key + '">';
        html += '  <div class="class-card-top">';
        html += '    <span class="period-badge">' + escapeHtml(cls.period) + '限</span>';
        html += '    <span class="class-status ' + (isSaved ? 'saved' : '') + '">' + (isSaved ? '保存済み' : '未確認') + '</span>';
        html += '  </div>';
        html += '  <div class="class-title">' + escapeHtml(cls.subjectName) + '</div>';
        html += '  <div class="class-meta">';
        html +=        escapeHtml(cls.grade) + '年 ' + escapeHtml(cls.unit) + '組<br>';
        html +=        '第' + escapeHtml(cls.sessionNumber) + '回';
        html += '  </div>';
        html += '</div>';
      });

      area.innerHTML = html;

      area.querySelectorAll(".class-card").forEach(function(card) {
        card.addEventListener("click", function() {
          const sessionKey = card.dataset.sessionKey;
          const nextClass = classesCache.find(function(cls) {
            return getSessionKey(cls) === sessionKey;
          });

          if (!nextClass) return;

          if (isDirty) {
            const ok = window.confirm("保存されていない変更があります。授業を切り替えますか？");
            if (!ok) return;
          }

          selectClass(nextClass);
        });
      });
    }

    function renderSelectedClassInfo() {
      const area = document.getElementById("selectedClassInfo");

      if (!selectedClass) {
        area.innerHTML = "授業が選択されていません。";
        return;
      }

      area.innerHTML =
        '<strong>' + escapeHtml(selectedClass.subjectName) + '</strong><br>' +
        escapeHtml(selectedClass.grade) + '年 ' +
        escapeHtml(selectedClass.unit) + '組 / ' +
        escapeHtml(selectedClass.date) + ' / ' +
        escapeHtml(selectedClass.period) + '限 / ' +
        '第' + escapeHtml(selectedClass.sessionNumber) + '回';
    }

    function renderSummary() {
      const area = document.getElementById("summaryArea");

      if (!studentsCache || studentsCache.length === 0) {
        area.innerHTML = "";
        return;
      }

      let present = 0;
      let absent = 0;
      let late = 0;
      let official = 0;

      studentsCache.forEach(function(student) {
        const status = attendanceState[student.studentId] || "";
     if (status === "") present++;
else if (status === "A") absent++;
else if (status === "L") late++;
else if (status === "O") official++;
      });

      area.innerHTML =
        '<div class="summary-item present">出席 ' + present + '</div>' +
        '<div class="summary-item absent">欠席 ' + absent + '</div>' +
        '<div class="summary-item late">遅刻 ' + late + '</div>' +
        '<div class="summary-item official">公欠 ' + official + '</div>';
    }

    function buildStatusButtons(studentId, currentCode) {
      let html = '<div class="status-buttons">';

      STATUS_OPTIONS.forEach(function(option) {
        let activeClass = "";
        if (option.code === currentCode) {
          if (option.className === "present") activeClass = "active-present";
          if (option.className === "absent") activeClass = "active-absent";
          if (option.className === "late") activeClass = "active-late";
          if (option.className === "official") activeClass = "active-official";
        }

        html += '<button type="button" class="status-btn ' + activeClass + '" data-student-id="' + escapeHtml(studentId) + '" data-status-code="' + escapeHtml(option.code) + '">';
        html += escapeHtml(option.label);
        html += '</button>';
      });

      html += '</div>';
      return html;
    }

    function renderStudents() {
      const studentArea = document.getElementById("studentArea");

      if (!studentsCache || studentsCache.length === 0) {
        studentArea.innerHTML = '<div class="empty-box">学生が見つかりませんでした。</div>';
        return;
      }

      let html = '<div class="table-wrap">';
      html += '<table>';
      html += '<thead><tr><th style="width:100px;">出席番号</th><th style="width:220px;">氏名</th><th>状態</th></tr></thead>';
      html += '<tbody>';

      studentsCache.forEach(function(student) {
        const currentCode = attendanceState[student.studentId] || "";
        html += '<tr>';
        html += '<td>' + escapeHtml(student.attendanceNumber) + '</td>';
        html += '<td class="student-name">' + escapeHtml(student.name) + '</td>';
        html += '<td>' + buildStatusButtons(student.studentId, currentCode) + '</td>';
        html += '</tr>';
      });

      html += '</tbody></table></div>';
      studentArea.innerHTML = html;

      bindStatusButtonEvents();
    }

    function bindStatusButtonEvents() {
      document.querySelectorAll(".status-btn").forEach(function(btn) {
        btn.addEventListener("click", function() {
          const studentId = btn.dataset.studentId;
          const statusCode = btn.dataset.statusCode;

          attendanceState[studentId] = statusCode;
          renderStudents();
          renderSummary();
          clearMessage();
          markDirty(true);
        });
      });
    }

    function applyAttendanceMap(attendanceMap) {
      studentsCache.forEach(function(student) {
        attendanceState[student.studentId] = "";
      });

      if (attendanceMap) {
        Object.keys(attendanceMap).forEach(function(studentId) {
          if (attendanceMap[studentId]) {
            attendanceState[studentId] = attendanceMap[studentId];
          }
        });
      }
    }

    function buildPayload(cls) {
      const records = [];

      studentsCache.forEach(function(student) {
        const code = attendanceState[student.studentId] || "";
        if (!code) {
          return;
        }

        records.push({
          studentId: student.studentId,
          statusCode: code
        });
      });

      return {
        classId: cls.classId,
        date: cls.date,
        period: cls.period,
        sessionNumber: cls.sessionNumber,
        attendance: records
      };
    }

    function setLoadingDetail() {
      document.getElementById("studentArea").innerHTML = '<div class="empty-box">学生一覧を読み込み中...</div>';
      document.getElementById("summaryArea").innerHTML = "";
      document.getElementById("selectedClassInfo").innerHTML = "授業情報を読み込み中...";
    }

function selectClass(cls) {
  selectedClass = cls;
  const sessionKey = getSessionKey(cls);

  renderClassList();
  renderSelectedClassInfo();
  setLoadingDetail();
  clearMessage();
  isDirty = false;
  setSaveStateText("");
  setSaveButtonsDisabled(true);

  // すでに画面内キャッシュがあれば通信せずに表示
  if (studentsByClassCache[cls.classId] && attendanceMapCache[sessionKey]) {
    studentsCache = studentsByClassCache[cls.classId];
    applyAttendanceMap(attendanceMapCache[sessionKey]);

    renderSelectedClassInfo();
    renderSummary();
    renderStudents();
    setSaveButtonsDisabled(false);

    if (Object.keys(attendanceMapCache[sessionKey]).length > 0) {
      savedSessionKeys[sessionKey] = true;
      setSaveStateText("保存済みデータを読み込みました（キャッシュ）");
    } else {
      setSaveStateText("初期状態は全員出席です（キャッシュ）");
    }

    renderClassList();
    return;
  }

  // キャッシュがなければサーバーから一括取得
  google.script.run
    .withSuccessHandler(function(detail) {
      const students = detail && detail.students ? detail.students : [];
      const attendanceMap = detail && detail.attendanceMap ? detail.attendanceMap : {};

      studentsCache = students;
      studentsByClassCache[cls.classId] = students;
      attendanceMapCache[sessionKey] = attendanceMap;

      studentsCache.forEach(function(student) {
        attendanceState[student.studentId] = "";
      });

      applyAttendanceMap(attendanceMap);
      renderSelectedClassInfo();
      renderSummary();
      renderStudents();
      setSaveButtonsDisabled(false);

      if (Object.keys(attendanceMap).length > 0) {
        savedSessionKeys[sessionKey] = true;
        setSaveStateText("保存済みデータを読み込みました");
      } else {
        setSaveStateText("初期状態は全員出席です");
      }

      renderClassList();
    })
    .withFailureHandler(function(error) {
      document.getElementById("studentArea").innerHTML =
        '<div class="empty-box">名簿または保存済み出欠の読み込みに失敗しました。</div>';
      showMessage("名簿または保存済み出欠の読み込みに失敗しました", "error");
      console.error(error);
    })
    .getTeacherSessionDetail(cls.classId, cls.date, cls.period);
}

function buildAttendanceMapFromState() {
  const map = {};

  studentsCache.forEach(function(student) {
    const code = attendanceState[student.studentId] || "";
    if (code) {
      map[student.studentId] = code;
    }
  });

  return map;
}

function handleSaveClick() {
  if (!selectedClass || isSaving) return;

  isSaving = true;
  markDirty(isDirty);
  showMessage("保存中です...", "warn");

  const payload = buildPayload(selectedClass);

  google.script.run
    .withSuccessHandler(function(result) {
      isSaving = false;
      isDirty = false;

      const key = getSessionKey(selectedClass);

      // 保存成功後に画面内キャッシュも最新化
      attendanceMapCache[key] = buildAttendanceMapFromState();
      studentsByClassCache[selectedClass.classId] = studentsCache;

      savedSessionKeys[key] = true;
      renderClassList();
      markDirty(false);
      setSaveStateText("保存しました");
      showMessage("保存しました", "success");
      console.log(result);
    })
    .withFailureHandler(function(error) {
      isSaving = false;
      markDirty(true);
      showMessage("保存に失敗しました", "error");
      console.error(error);
    })
    .saveAttendance(payload);
}

function initButtons() {
  const resetBtn = document.getElementById("resetPresentButton");
  const saveTopBtn = document.getElementById("saveButtonTop");
  const saveBottomBtn = document.getElementById("saveButtonBottom");

  if (resetBtn) {
    resetBtn.addEventListener("click", function() {
      if (!studentsCache || studentsCache.length === 0) return;

      studentsCache.forEach(function(student) {
        attendanceState[student.studentId] = "";
      });

      renderStudents();
      renderSummary();
      clearMessage();
      markDirty(true);
    });
  }

  if (saveTopBtn) {
    saveTopBtn.addEventListener("click", handleSaveClick);
  }

  if (saveBottomBtn) {
    saveBottomBtn.addEventListener("click", handleSaveClick);
  }
}

    function chooseInitialClass(classes) {
      if (!classes || classes.length === 0) return null;

      if (preSelectedSession.classId) {
        const matched = classes.find(function(c) {
          return (
            c.classId === preSelectedSession.classId &&
            c.date === preSelectedSession.date &&
            String(c.period) === String(preSelectedSession.period)
          );
        });

        if (matched) {
          return matched;
        }
      }

      return classes[0];
    }

    function init() {
      renderPageSubText();
      initButtons();

      google.script.run
        .withSuccessHandler(function(classes) {
          classesCache = classes || [];

          if (!classesCache.length) {
            renderClassList();
            document.getElementById("selectedClassInfo").innerHTML = "今日の授業はありません。";
            document.getElementById("studentArea").innerHTML = '<div class="empty-box">出席入力の対象授業はありません。</div>';
            return;
          }

          renderClassList();

          const initialClass = chooseInitialClass(classesCache);
          if (initialClass) {
            selectClass(initialClass);
          }
        })
        .withFailureHandler(function(error) {
          document.getElementById("classListArea").innerHTML = '<div class="empty-box">授業情報の読み込みに失敗しました。</div>';
          document.getElementById("selectedClassInfo").innerHTML = "授業情報の読み込みに失敗しました。";
          document.getElementById("studentArea").innerHTML = '<div class="empty-box">読み込みに失敗しました。</div>';
          showMessage("授業情報の読み込みに失敗しました", "error");
          console.error(error);
        })
        .getTodayClassesForCurrentUser(preSelectedSession.date);
    }

    init();
  </script>
</body>
</html>
