<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>科目担当画面</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 16px;
      font-family: sans-serif;
      background: #f5f7fb;
      color: #222;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }

    .page-header { margin-bottom: 16px; }

    .sub-text {
      color: #666;
      font-size: 14px;
      margin-bottom: 8px;
    }

    .message {
      min-height: 24px;
      margin: 8px 0 16px;
      padding: 10px 12px;
      border-radius: 8px;
      background: #eef3ff;
      color: #1f3c88;
      font-size: 14px;
      display: none;
    }

    .message.show { display: block; }
    .message.success { background: #e8f7ec; color: #1d6b37; }
    .message.error { background: #fdecec; color: #a12622; }
    .message.warn { background: #fff4db; color: #8a5a00; }

    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 16px;
      align-items: start;
    }

    .panel {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    .panel h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .mode-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .mode-tab {
      border: 1px solid #ccd5e3;
      background: #fff;
      color: #334;
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
    }

    .mode-tab.active {
      background: #2f6feb;
      border-color: #2f6feb;
      color: #fff;
    }

    .search-box {
      border: 1px solid #d9e0ee;
      border-radius: 10px;
      background: #f8fbff;
      padding: 12px;
      margin-bottom: 12px;
    }

    .search-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-row input[type="date"] {
      border: 1px solid #ccd5e3;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 14px;
    }

    .search-note {
      margin-top: 8px;
      font-size: 12px;
      color: #667;
    }

    .class-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .class-card {
      border: 1px solid #d9e0ee;
      border-radius: 10px;
      padding: 12px;
      background: #fff;
      cursor: pointer;
      transition: 0.15s;
    }

    .class-card:hover {
      background: #f8fbff;
      border-color: #9db7ef;
    }

    .class-card.active {
      border: 2px solid #2f6feb;
      background: #eef4ff;
    }

    .class-card-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
      align-items: center;
    }

    .period-badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      background: #e9eefb;
      color: #31456a;
      font-size: 12px;
      font-weight: bold;
    }

    .class-status {
      font-size: 12px;
      font-weight: bold;
      color: #666;
    }

    .class-status.saved { color: #1d6b37; }

    .class-title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .class-meta {
      font-size: 13px;
      color: #666;
      line-height: 1.6;
    }

    .info-bar {
      border: 1px solid #d9e0ee;
      border-radius: 10px;
      background: #f8fbff;
      padding: 12px;
      margin-bottom: 12px;
      line-height: 1.8;
    }

    .summary {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .summary-item {
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: bold;
      background: #eef2f7;
      color: #334;
    }

    .summary-item.present { background: #e8f7ec; color: #1d6b37; }
    .summary-item.absent { background: #fdecec; color: #a12622; }
    .summary-item.late { background: #fff4db; color: #8a5a00; }
    .summary-item.official { background: #e7f0ff; color: #1f4fa3; }

    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
    }

    th, td {
      border-bottom: 1px solid #e5e9f2;
      padding: 10px 8px;
      text-align: left;
      vertical-align: middle;
      font-size: 14px;
      white-space: nowrap;
    }

    th {
      background: #f7f9fc;
      font-size: 13px;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .student-name { font-weight: 600; }

    .status-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .status-btn {
      border: 1px solid #ccd5e3;
      background: #fff;
      color: #333;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 13px;
      cursor: pointer;
      transition: 0.15s;
    }

    .status-btn:hover { background: #f4f7fb; }
    .status-btn.active-present { background: #e8f7ec; border-color: #8fd1a3; color: #1d6b37; font-weight: bold; }
    .status-btn.active-absent { background: #fdecec; border-color: #e3a6a6; color: #a12622; font-weight: bold; }
    .status-btn.active-late { background: #fff4db; border-color: #e1c36c; color: #8a5a00; font-weight: bold; }
    .status-btn.active-official { background: #e7f0ff; border-color: #98b7ef; color: #1f4fa3; font-weight: bold; }

    .risk-badge {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      border: 1px solid transparent;
    }

    .risk-normal {
      background: #e8f7ec;
      color: #1d6b37;
      border-color: #a7d8b4;
    }

    .risk-warning {
      background: #fff4db;
      color: #8a5a00;
      border-color: #e7cb76;
    }

    .risk-over {
      background: #fdecec;
      color: #a12622;
      border-color: #e5aaaa;
    }

    .risk-row-normal {
      background: #fcfffd;
    }

    .risk-row-warning {
      background: #fffaf0;
    }

    .risk-row-over {
      background: #fff5f5;
    }

    .sort-note {
      margin-bottom: 10px;
      font-size: 12px;
      color: #667;
    }

    .action-bar {
      margin-top: 16px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button.main-btn {
      border: none;
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }

    .save-btn { background: #2f6feb; color: #fff; }
    .save-btn:disabled { background: #a9bfdc; cursor: not-allowed; }
    .secondary-btn { background: #eef2f7; color: #334; }

    .empty-box {
      padding: 20px;
      border: 1px dashed #ccd5e3;
      border-radius: 10px;
      background: #fafcff;
      color: #667;
    }

    .save-state {
      font-size: 13px;
      color: #666;
      margin-top: 4px;
      margin-bottom: 12px;
    }

    .top-action-bar {
      margin-top: 0;
      margin-bottom: 12px;
    }

    .bottom-action-bar { margin-top: 16px; }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      body {
        padding: 12px;
      }

      h1 {
        font-size: 22px;
      }

      .panel {
        padding: 12px;
      }

      .search-box,
      .info-bar,
      .quick-nav {
        padding: 10px;
      }

      th,
      td {
        font-size: 13px;
      }

      .status-btn {
        padding: 6px 8px;
        font-size: 12px;
      }

      button.main-btn {
        width: 100%;
      }

      .action-bar,
      .top-action-bar,
      .bottom-action-bar {
        flex-direction: column;
      }
    }

    .quick-nav {
      margin-bottom: 12px;
      padding: 12px;
      border: 1px solid #d9e0ee;
      border-radius: 10px;
      background: #f8fbff;
    }

    .quick-nav-title {
      font-size: 13px;
      font-weight: bold;
      color: #334;
      margin-bottom: 8px;
    }

    .quick-period-block + .quick-period-block {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed #d9e0ee;
    }

    .quick-period-label {
      font-size: 12px;
      font-weight: bold;
      color: #4a5b7a;
      margin-bottom: 6px;
    }

    .quick-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .quick-class-btn {
      border: 1px solid #ccd5e3;
      background: #fff;
      color: #334;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
    }

    .quick-class-btn:hover {
      background: #eef4ff;
      border-color: #9db7ef;
    }

    .quick-class-btn.active {
      background: #2f6feb;
      border-color: #2f6feb;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="page-header">
    <h1>科目担当画面</h1>
    <div class="sub-text" id="pageSubText">読み込み中...</div>
    <div id="messageArea" class="message"></div>
  </div>

  <div class="layout">
    <div class="panel">
      <h2>担当授業</h2>

      <div class="mode-tabs">
        <button id="modeTodayBtn" type="button" class="mode-tab active">本日の授業</button>
        <button id="modePastBtn" type="button" class="mode-tab">過去授業を検索</button>
      </div>

      <div id="pastSearchBox" class="search-box" style="display:none;">
        <div class="search-row">
          <input type="date" id="pastDateInput">
          <button id="searchPastButton" type="button" class="main-btn secondary-btn">検索する</button>
        </div>
        <div class="search-note">最後に検索した日付を保持します。</div>
      </div>
      <div id="quickClassNav" class="quick-nav" style="display:none;"></div>

      <div id="classListArea" class="class-list">
        <div class="empty-box">授業情報を読み込み中...</div>
      </div>
    </div>

    <div class="panel">
      <h2>出席入力</h2>

      <div id="selectedClassInfo" class="info-bar">授業を読み込み中...</div>
      <div id="lastSavedInfoBar" class="info-bar" style="display:none;"></div>
      <div id="groupSelectorArea" class="info-bar" style="display:none;">
        <label for="groupSelect"><strong>班選択</strong></label><br>
        <select id="groupSelect" style="margin-top:8px; padding:8px 10px; min-width:180px;">
          <option value="">班を選択してください</option>
        </select>
        <div style="margin-top:8px; font-size:12px; color:#667;">
          工学実験では班を選択すると、その班の学生のみ表示します。
        </div>
      </div>

      <div class="action-bar top-action-bar">
        <button id="resetPresentButton" type="button" class="main-btn secondary-btn">全員を出席にする</button>
        <button id="saveButtonTop" type="button" class="main-btn save-btn" disabled>保存する</button>
      </div>

      <div id="saveState" class="save-state"></div>
      <div id="summaryArea" class="summary"></div>
      <div id="sortNote" class="sort-note"></div>

      <div id="studentArea">
        <div class="empty-box">学生一覧を読み込み中...</div>
      </div>

      <div class="action-bar bottom-action-bar">
        <button id="saveButtonBottom" type="button" class="main-btn save-btn" disabled>保存する</button>
      </div>
    </div>
  </div>

  <script>
    const preSelectedSession = {
      classId: "<?= classId ?>",
      date: "<?= date ?>",
      period: "<?= period ?>"
    };

    const STATUS_OPTIONS = [
      { code: "", label: "出席", className: "present" },
      { code: "A", label: "欠席", className: "absent" },
      { code: "L", label: "遅刻", className: "late" },
      { code: "O", label: "公欠", className: "official" }
    ];

    const STORAGE_KEYS = {
      pastDate: "teacher_past_search_date_v1"
    };

    const CLASS_LIST_EMPTY_RETRY_MS = 350;
    const CLASS_LIST_EMPTY_RETRY_MAX = 1;

    let currentMode = "today";
    let classesCache = [];
    let isClassListLoading = false;
    let selectedClass = null;
    let studentsCache = [];
    let attendanceState = {};
    let riskMapState = {};
    let isDirty = false;
    let isSaving = false;
    let savedSessionKeys = {};
    let studentsByClassCache = {};
    let attendanceMapCache = {};
    let riskMapCache = {};
    let selectedGroupByClassCache = {};
    let groupListByClassCache = {};
    let isRiskLoading = false;

    let classListRequestToken = 0;
    let detailRequestToken = 0;
    let groupListRequestToken = 0;
    let riskRequestToken = 0;

    function debugLog(label, value) {
      try {
        console.log("[teacher-debug]", label, value);
      } catch (e) {}
    }

    function getSessionKey(cls) {
      return [cls.classId, cls.date, cls.period].join("__");
    }

    function showMessage(text, type) {
      const el = document.getElementById("messageArea");
      el.textContent = text;
      el.className = "message show";
      if (type) el.classList.add(type);
    }

    function clearMessage() {
      const el = document.getElementById("messageArea");
      el.textContent = "";
      el.className = "message";
    }

    function setSaveStateText(text) {
      document.getElementById("saveState").textContent = text || "";
    }

    function setSaveButtonsDisabled(disabled) {
      const topBtn = document.getElementById("saveButtonTop");
      const bottomBtn = document.getElementById("saveButtonBottom");
      if (topBtn) topBtn.disabled = disabled;
      if (bottomBtn) bottomBtn.disabled = disabled;
    }

    function markDirty(flag) {
      isDirty = flag;

      if (isSaving) {
        setSaveButtonsDisabled(true);
        return;
      }

      setSaveButtonsDisabled(!selectedClass);

      if (flag) {
        setSaveStateText("未保存の変更があります");
      }
    }

    function escapeHtml(str) {
      if (str == null) return "";
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function formatTeachersText(teachers) {
      if (!Array.isArray(teachers) || teachers.length === 0) {
        return "";
      }

      return teachers.map(function(t) {
        const name = t && t.teacherName ? String(t.teacherName) : "";
        const roleType = t && t.roleType ? String(t.roleType) : "";

        if (!name) return "";

        if (roleType === "main") return name + "（主担当）";
        if (roleType === "support") return name + "（共同担当）";
        return name;
      }).filter(Boolean).join(" / ");
    }

    function savePastSearchDate(value) {
      try {
        localStorage.setItem(STORAGE_KEYS.pastDate, value || "");
      } catch (e) {}
    }

    function loadPastSearchDate() {
      try {
        return localStorage.getItem(STORAGE_KEYS.pastDate) || "";
      } catch (e) {
        return "";
      }
    }

    function setPastSearchLoading(flag) {
      const searchPastButton = document.getElementById("searchPastButton");
      const pastDateInput = document.getElementById("pastDateInput");

      if (searchPastButton) searchPastButton.disabled = flag;
      if (pastDateInput) pastDateInput.disabled = flag;
    }

    function getTodayDateKeyJst() {
      const now = new Date();
      const yyyy = now.getFullYear();
      const mm = String(now.getMonth() + 1).padStart(2, "0");
      const dd = String(now.getDate()).padStart(2, "0");
      return yyyy + "-" + mm + "-" + dd;
    }

    function parseYmdAsLocalDate(dateStr) {
      if (!dateStr) return null;

      const m = String(dateStr).match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (m) {
        return new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
      }

      const d = new Date(dateStr);
      return isNaN(d.getTime()) ? null : d;
    }

    function formatDateJa(dateStr) {
      if (!dateStr) return "";

      const d = parseYmdAsLocalDate(dateStr);
      if (!d) return dateStr;

      const weekNames = ["日", "月", "火", "水", "木", "金", "土"];
      const y = d.getFullYear();
      const m = d.getMonth() + 1;
      const day = d.getDate();
      const w = weekNames[d.getDay()];

      return y + "年" + m + "月" + day + "日（" + w + "）";
    }

    function renderPageSubText() {
      if (currentMode === "today") {
        const todayText = formatDateJa(getTodayDateKeyJst());
        document.getElementById("pageSubText").textContent =
          todayText + " の担当授業を選択して出席を入力してください。";
      } else {
        document.getElementById("pageSubText").textContent =
          "指定日の担当授業を検索して、保存済み出欠を修正できます。";
      }
    }

    function updateModeUI() {
      document.getElementById("modeTodayBtn").classList.toggle("active", currentMode === "today");
      document.getElementById("modePastBtn").classList.toggle("active", currentMode === "past");
      document.getElementById("pastSearchBox").style.display = currentMode === "past" ? "block" : "none";
      renderPageSubText();
    }

    function getRiskBadgeHtml(risk) {
      const level = String((risk && risk.riskLevel) || "normal");
      const label = String((risk && risk.riskLabel) || "正常");

      if (level === "warning") {
        return '<span class="risk-badge risk-warning">' + escapeHtml(label) + '</span>';
      }
      if (level === "official_over" || level === "normal_over") {
        return '<span class="risk-badge risk-over">' + escapeHtml(label) + '</span>';
      }
      return '<span class="risk-badge risk-normal">' + escapeHtml(label) + '</span>';
    }

    function getRiskSortWeight(risk) {
      const level = String((risk && risk.riskLevel) || "normal");
      if (level === "official_over" || level === "normal_over") return 0;
      if (level === "warning") return 1;
      return 2;
    }

    function getRiskRowClass(risk) {
      const level = String((risk && risk.riskLevel) || "normal");
      if (level === "official_over" || level === "normal_over") return "risk-row-over";
      if (level === "warning") return "risk-row-warning";
      return "risk-row-normal";
    }

    function getSortedStudents() {
      return (studentsCache || []).slice().sort(function(a, b) {
        const riskA = riskMapState[a.studentId] || {};
        const riskB = riskMapState[b.studentId] || {};

        const weightA = getRiskSortWeight(riskA);
        const weightB = getRiskSortWeight(riskB);

        if (weightA !== weightB) {
          return weightA - weightB;
        }

        return Number(a.attendanceNumber) - Number(b.attendanceNumber);
      });
    }

    function renderSortNote() {
      const el = document.getElementById("sortNote");
      if (!studentsCache || studentsCache.length === 0) {
        el.textContent = "";
        return;
      }
      el.textContent = "表示順: 超過・注意の学生を上に表示しています。";
    }

    function buildQuickGroupMap(classes) {
      const map = {};

      (classes || []).forEach(function(cls) {
        const periodKey = String(cls.period || "");
        if (!map[periodKey]) {
          map[periodKey] = [];
        }
        map[periodKey].push(cls);
      });

      Object.keys(map).forEach(function(periodKey) {
        map[periodKey].sort(function(a, b) {
          const unitA = String(a.unit || "");
          const unitB = String(b.unit || "");
          return unitA.localeCompare(unitB, "ja");
        });
      });

      return map;
    }

    function buildQuickButtonLabel(cls, sameSubjectInPeriod) {
      const unitText = (cls.grade ? cls.grade + "年 " : "") + (cls.unit ? cls.unit + "組" : "");

      if (sameSubjectInPeriod) {
        return unitText;
      }

      return (cls.subjectName || "") + " " + unitText;
    }

    function renderQuickClassNav() {
      const area = document.getElementById("quickClassNav");

      if (!classesCache || classesCache.length === 0) {
        area.style.display = "none";
        area.innerHTML = "";
        return;
      }

      const grouped = buildQuickGroupMap(classesCache);
      const sortedPeriods = Object.keys(grouped).sort(function(a, b) {
        return Number(a) - Number(b);
      });

      let html = '<div class="quick-nav-title">時限ごとの選択</div>';

      sortedPeriods.forEach(function(periodKey) {
        const classes = grouped[periodKey];
        const subjectSet = {};
        classes.forEach(function(cls) {
          subjectSet[String(cls.subjectName || "")] = true;
        });
        const sameSubjectInPeriod = Object.keys(subjectSet).length === 1;

        html += '<div class="quick-period-block">';
        html += '<div class="quick-period-label">' + escapeHtml(periodKey) + '限</div>';
        html += '<div class="quick-buttons">';

        classes.forEach(function(cls) {
          const key = getSessionKey(cls);
          const active = selectedClass && key === getSessionKey(selectedClass);
          const label = buildQuickButtonLabel(cls, sameSubjectInPeriod);

          html += '<button type="button" class="quick-class-btn' + (active ? ' active' : '') + '" data-session-key="' + key + '">';
          html += escapeHtml(label);
          html += '</button>';
        });

        html += '</div>';
        html += '</div>';
      });

      area.innerHTML = html;
      area.style.display = "block";

      area.querySelectorAll(".quick-class-btn").forEach(function(btn) {
        btn.addEventListener("click", function() {
          const sessionKey = btn.dataset.sessionKey;
          const nextClass = classesCache.find(function(cls) {
            return getSessionKey(cls) === sessionKey;
          });

          if (!nextClass) return;

          if (isDirty) {
            const ok = window.confirm("保存されていない変更があります。授業を切り替えますか？");
            if (!ok) return;
          }

          selectClass(nextClass);
        });
      });
    }

    function renderClassList() {
      const area = document.getElementById("classListArea");
      const quickNav = document.getElementById("quickClassNav");

      debugLog("renderClassList currentMode", currentMode);
      debugLog("renderClassList isClassListLoading", isClassListLoading);
      debugLog("renderClassList classesCache length", Array.isArray(classesCache) ? classesCache.length : -1);
      debugLog("renderClassList classesCache", classesCache);

      if (isClassListLoading) {
        quickNav.style.display = "none";
        area.innerHTML = '<div class="empty-box">授業情報を読み込み中...</div>';
        return;
      }

      if (!classesCache || classesCache.length === 0) {
        quickNav.style.display = "none";
        area.innerHTML = '<div class="empty-box">' + (currentMode === "today" ? '今日の授業はありません。' : '該当日の担当授業はありません。') + '</div>';
        return;
      }

      renderQuickClassNav();

      let html = "";

      classesCache.forEach(function(cls) {
        const key = getSessionKey(cls);
        const activeClass = selectedClass && key === getSessionKey(selectedClass);
        const isSaved = !!(cls.isSaved || savedSessionKeys[key]);

        html += '<div class="class-card' + (activeClass ? ' active' : '') + '" data-session-key="' + key + '">';
        html += '  <div class="class-card-top">';
        html += '    <span class="period-badge">' + escapeHtml(cls.period) + '限</span>';
        html += '    <span class="class-status ' + (isSaved ? 'saved' : '') + '">' + (isSaved ? '保存済み' : '未確認') + '</span>';
        html += '  </div>';
        html += '  <div class="class-title">' + escapeHtml(cls.subjectName) + '</div>';
        html += '  <div class="class-meta">';
        html +=        escapeHtml(cls.grade) + '年 ' + escapeHtml(cls.unit) + '組<br>';
        html +=        escapeHtml(cls.date) + ' / 第' + escapeHtml(cls.sessionNumber) + '回';

        if (cls.teachers && cls.teachers.length > 0) {
          html += '<br>担当: ' + escapeHtml(formatTeachersText(cls.teachers));
        } else if (cls.teacherName) {
          html += '<br>担当: ' + escapeHtml(cls.teacherName);
        }

        if (cls.lastSavedInfo && cls.lastSavedInfo.savedAtText) {
          html += '<br>最終保存: ' + escapeHtml(cls.lastSavedInfo.savedAtText);
        }

        html += '  </div>';
        html += '</div>';
      });

      area.innerHTML = html;

      area.querySelectorAll(".class-card").forEach(function(card) {
        card.addEventListener("click", function() {
          const sessionKey = card.dataset.sessionKey;
          const nextClass = classesCache.find(function(cls) {
            return getSessionKey(cls) === sessionKey;
          });

          if (!nextClass) return;

          if (isDirty) {
            const ok = window.confirm("保存されていない変更があります。授業を切り替えますか？");
            if (!ok) return;
          }

          selectClass(nextClass);
        });
      });
    }

    function renderSelectedClassInfo() {
      const area = document.getElementById("selectedClassInfo");

      if (!selectedClass) {
        area.innerHTML = currentMode === "today"
          ? "本日の授業が選択されていません。"
          : "過去授業が選択されていません。";
        return;
      }

      let teacherLine = "";
      if (selectedClass.teachers && selectedClass.teachers.length > 0) {
        teacherLine = '担当: ' + escapeHtml(formatTeachersText(selectedClass.teachers));
      } else if (selectedClass.teacherName) {
        teacherLine = '担当: ' + escapeHtml(selectedClass.teacherName);
      }

      area.innerHTML =
        '<strong>' + escapeHtml(selectedClass.subjectName) + '</strong><br>' +
        escapeHtml(selectedClass.grade) + '年 ' +
        escapeHtml(selectedClass.unit) + '組 / ' +
        escapeHtml(selectedClass.date) + ' / ' +
        escapeHtml(selectedClass.period) + '限 / ' +
        '第' + escapeHtml(selectedClass.sessionNumber) + '回' +
        (teacherLine ? '<br>' + teacherLine : '');
    }

    function buildLastSavedInfoText(info) {
      if (!info) return "";

      let text = "最終保存: " + (info.savedAtText || "");

      if (info.savedByCurrentUser) {
        text += " / あなた";
      } else if (info.teacherEmail) {
        text += " / " + info.teacherEmail;
      }

      if (info.savedModeLabel) {
        text += " / " + info.savedModeLabel;
      }

      return text;
    }

    function renderLastSavedInfoBar(info) {
      const area = document.getElementById("lastSavedInfoBar");
      if (!area) return;

      const text = buildLastSavedInfoText(info);
      if (!text) {
        area.style.display = "none";
        area.innerHTML = "";
        return;
      }

      area.style.display = "block";
      area.innerHTML = "<strong>" + escapeHtml(text) + "</strong>";
    }

    function renderSummary() {
      const area = document.getElementById("summaryArea");

      if (!studentsCache || studentsCache.length === 0) {
        area.innerHTML = "";
        return;
      }

      let present = 0;
      let absent = 0;
      let late = 0;
      let official = 0;

      studentsCache.forEach(function(student) {
        const status = attendanceState[student.studentId] || "";
        if (status === "") present++;
        else if (status === "A") absent++;
        else if (status === "L") late++;
        else if (status === "O") official++;
      });

      area.innerHTML =
        '<div class="summary-item present">出席 ' + present + '</div>' +
        '<div class="summary-item absent">欠席 ' + absent + '</div>' +
        '<div class="summary-item late">遅刻 ' + late + '</div>' +
        '<div class="summary-item official">公欠 ' + official + '</div>';
    }

    function buildStatusButtons(studentId, currentCode) {
      let html = '<div class="status-buttons">';

      STATUS_OPTIONS.forEach(function(option) {
        let activeClass = "";
        if (option.code === currentCode) {
          if (option.className === "present") activeClass = "active-present";
          if (option.className === "absent") activeClass = "active-absent";
          if (option.className === "late") activeClass = "active-late";
          if (option.className === "official") activeClass = "active-official";
        }

        html += '<button type="button" class="status-btn ' + activeClass + '" data-student-id="' + escapeHtml(studentId) + '" data-status-code="' + escapeHtml(option.code) + '">';
        html += escapeHtml(option.label);
        html += '</button>';
      });

      html += '</div>';
      return html;
    }

      function renderStudents() {
        const studentArea = document.getElementById("studentArea");

        console.log("[teacher-debug] renderStudents", {
          studentsCacheLength: studentsCache ? studentsCache.length : -1,
          studentsCache: studentsCache
        });

        if (!studentsCache || studentsCache.length === 0) {
          studentArea.innerHTML = '<div class="empty-box">学生が見つかりませんでした。</div>';
          renderSortNote();
          return;
        }

      const displayStudents = getSortedStudents();

      let html = '';
      if (isRiskLoading) {
        html += '<div class="mini-loading">欠席リスク情報を読み込み中...</div>';
      }
      html += '<div class="table-wrap">';
      html += '<table>';
      html += '<thead><tr>';
      html += '<th style="width:90px;">出席番号</th>';
      html += '<th style="width:180px;">氏名</th>';
      html += '<th>状態</th>';
      html += '<th>欠席</th>';
      html += '<th>公欠</th>';
      html += '<th>遅刻</th>';
      html += '<th>残り許容</th>';
      html += '<th>判定</th>';
      html += '</tr></thead>';
      html += '<tbody>';

      displayStudents.forEach(function(student) {
        const currentCode = attendanceState[student.studentId] || "";
        const risk = riskMapState[student.studentId] || {};
        const rowClass = getRiskRowClass(risk);
        const isRiskReady = Object.prototype.hasOwnProperty.call(riskMapState, student.studentId);

        html += '<tr class="' + rowClass + '">';
        html += '<td>' + escapeHtml(student.attendanceNumber) + '</td>';
        html += '<td class="student-name">' + escapeHtml(student.name) + '</td>';
        html += '<td>' + buildStatusButtons(student.studentId, currentCode) + '</td>';
        html += '<td>' + (isRiskReady ? escapeHtml(risk.normalAbsence || 0) : '...') + '</td>';
        html += '<td>' + (isRiskReady ? escapeHtml(risk.officialAbsence || 0) : '...') + '</td>';
        html += '<td>' + (isRiskReady ? escapeHtml(risk.late || 0) : '...') + '</td>';
        html += '<td>' + (isRiskReady ? escapeHtml(risk.remaining || 0) : '...') + '</td>';
        html += '<td>' + (isRiskReady ? getRiskBadgeHtml(risk) : '<span class="risk-badge risk-normal">読込中</span>') + '</td>';
        html += '</tr>';
      });

      html += '</tbody></table></div>';
      studentArea.innerHTML = html;

      renderSortNote();
      bindStatusButtonEvents();
    }

    function bindStatusButtonEvents() {
      document.querySelectorAll(".status-btn").forEach(function(btn) {
        btn.addEventListener("click", function() {
          const studentId = btn.dataset.studentId;
          const statusCode = btn.dataset.statusCode;

          attendanceState[studentId] = statusCode;
          renderStudents();
          renderSummary();
          clearMessage();
          markDirty(true);
        });
      });
    }

    function applyAttendanceMap(attendanceMap) {
      studentsCache.forEach(function(student) {
        attendanceState[student.studentId] = "";
      });

      if (attendanceMap) {
        Object.keys(attendanceMap).forEach(function(studentId) {
          if (attendanceMap[studentId] != null) {
            attendanceState[studentId] = attendanceMap[studentId];
          }
        });
      }
    }

    function buildPayload(cls) {
      const records = [];

      studentsCache.forEach(function(student) {
        const code = attendanceState[student.studentId] || "";
        records.push({
          studentId: student.studentId,
          statusCode: code
        });
      });

      const group = requiresGroupSelection(cls) ? (selectedGroupByClassCache[cls.classId] || "") : "";

      return {
        classId: cls.classId,
        date: cls.date,
        period: cls.period,
        sessionNumber: cls.sessionNumber,
        group: group,
        attendance: records
      };
    }

    function setLoadingDetail() {
      document.getElementById("studentArea").innerHTML = '<div class="empty-box">学生一覧を読み込み中...</div>';
      document.getElementById("summaryArea").innerHTML = "";
      document.getElementById("sortNote").textContent = "";
      document.getElementById("selectedClassInfo").innerHTML = "授業情報を読み込み中...";
      renderLastSavedInfoBar(null);
    }

    function loadRiskMapForCurrentSelection(cls, group, students, riskCacheKey) {
      const expectedSessionKey = getSessionKey(cls);
      const expectedGroup = group || "";
      const requestToken = ++riskRequestToken;
      const studentIds = (students || []).map(function(student) {
        return student.studentId;
      });

      isRiskLoading = true;
      renderStudents();

      google.script.run
        .withSuccessHandler(function(riskMap) {
          const currentSelectedKey = selectedClass ? getSessionKey(selectedClass) : "";
          const currentGroup = selectedClass
            ? (selectedGroupByClassCache[selectedClass.classId] || "")
            : "";

          if (
            requestToken !== riskRequestToken ||
            currentSelectedKey !== expectedSessionKey ||
            currentGroup !== expectedGroup
          ) {
            return;
          }

          riskMapState = riskMap || {};
          riskMapCache[riskCacheKey] = riskMapState;
          isRiskLoading = false;
          renderSummary();
          renderStudents();
        })
        .withFailureHandler(function(error) {
          const currentSelectedKey = selectedClass ? getSessionKey(selectedClass) : "";
          const currentGroup = selectedClass
            ? (selectedGroupByClassCache[selectedClass.classId] || "")
            : "";

          if (
            requestToken !== riskRequestToken ||
            currentSelectedKey !== expectedSessionKey ||
            currentGroup !== expectedGroup
          ) {
            return;
          }

          isRiskLoading = false;
          riskMapState = {};
          renderSummary();
          renderStudents();
          console.error(error);
        })
        .getStudentRiskMapForTeacherSession(cls.classId, studentIds);
    }

    function loadClassDetailWithGroup(cls, group) {
      const expectedSessionKey = getSessionKey(cls);
      const expectedGroup = group || "";
      const requestToken = ++detailRequestToken;

      const sessionKey = expectedGroup
        ? expectedSessionKey + "__" + expectedGroup
        : expectedSessionKey;

      const studentCacheKey = expectedGroup
        ? cls.classId + "__" + expectedGroup
        : cls.classId;

      const riskCacheKey = expectedGroup
        ? cls.classId + "__" + expectedGroup
        : cls.classId;

      setLoadingDetail();
      renderSelectedClassInfo();
      clearMessage();
      isDirty = false;
      setSaveStateText("");
      setSaveButtonsDisabled(true);
      isRiskLoading = false;

      if (
        currentMode === "today" &&
        Object.prototype.hasOwnProperty.call(studentsByClassCache, studentCacheKey) &&
        Object.prototype.hasOwnProperty.call(attendanceMapCache, sessionKey)
      ) {
        console.log("[teacher-debug] detail cache hit", {
          classId: cls.classId,
          expectedGroup: expectedGroup,
          sessionKey: sessionKey,
          studentCacheKey: studentCacheKey,
          riskCacheKey: riskCacheKey,
          cachedStudentsLength: (studentsByClassCache[studentCacheKey] || []).length,
          cachedAttendanceKeys: Object.keys(attendanceMapCache[sessionKey] || {})
        });

        studentsCache = studentsByClassCache[studentCacheKey] || [];
        riskMapState = riskMapCache[riskCacheKey] || {};
        applyAttendanceMap(attendanceMapCache[sessionKey] || {});

        renderSelectedClassInfo();
        renderSummary();
        renderStudents();
        setSaveButtonsDisabled(false);

        const cachedHasSavedSession = !!(cls.isSaved || savedSessionKeys[getSessionKey(cls)] || savedSessionKeys[sessionKey]);

        if (cachedHasSavedSession) {
          savedSessionKeys[getSessionKey(cls)] = true;
          savedSessionKeys[sessionKey] = true;
          setSaveStateText(
            Object.keys(attendanceMapCache[sessionKey] || {}).length > 0
              ? "保存済みデータを読み込みました（キャッシュ）"
              : "保存済みデータを読み込みました（全員出席・キャッシュ）"
          );
        } else {
          setSaveStateText("初期状態は全員出席です（未保存）");
        }

        renderLastSavedInfoBar(cls.lastSavedInfo || null);

        renderClassList();

        if (!Object.prototype.hasOwnProperty.call(riskMapCache, riskCacheKey)) {
          loadRiskMapForCurrentSelection(cls, expectedGroup, studentsCache, riskCacheKey);
        }
        return;
      }

      google.script.run
        .withSuccessHandler(function(detail) {
          const currentSelectedKey = selectedClass ? getSessionKey(selectedClass) : "";
          const currentGroup = selectedClass
            ? (selectedGroupByClassCache[selectedClass.classId] || "")
            : "";

          console.log("[teacher-debug] detail raw", detail);
          console.log("[teacher-debug] detail summary", {
            classId: cls.classId,
            expectedGroup: expectedGroup,
            sessionKey: sessionKey,
            studentCacheKey: studentCacheKey,
            riskCacheKey: riskCacheKey,
            studentsLength: detail && detail.students ? detail.students.length : -1,
            attendanceKeys: detail && detail.attendanceMap ? Object.keys(detail.attendanceMap) : [],
            hasSavedSession: !!(detail && detail.hasSavedSession),
            availableGroups: detail && detail.availableGroups ? detail.availableGroups : []
          });

          if (
            requestToken !== detailRequestToken ||
            currentSelectedKey !== expectedSessionKey ||
            currentGroup !== expectedGroup
          ) {
            return;
          }

          const students = detail && detail.students ? detail.students : [];
          const attendanceMap = detail && detail.attendanceMap ? detail.attendanceMap : {};
          const hasSavedSession = !!(detail && detail.hasSavedSession);
          const lastSavedInfo = detail && detail.lastSavedInfo ? detail.lastSavedInfo : null;

          studentsCache = students;
          riskMapState = {};

          console.log("[teacher-debug] after assign studentsCache", {
            studentsCacheLength: studentsCache.length,
            firstStudent: studentsCache.length ? studentsCache[0] : null
          });

          studentsByClassCache[studentCacheKey] = students;
          attendanceMapCache[sessionKey] = attendanceMap;

          applyAttendanceMap(attendanceMap);
          renderSelectedClassInfo();
          renderSummary();
          renderStudents();
          setSaveButtonsDisabled(false);

          cls.isSaved = hasSavedSession;
          cls.lastSavedInfo = lastSavedInfo;

          if (hasSavedSession) {
            savedSessionKeys[getSessionKey(cls)] = true;
            savedSessionKeys[sessionKey] = true;
            setSaveStateText(
              Object.keys(attendanceMap).length > 0
                ? "保存済みデータを読み込みました"
                : "保存済みデータを読み込みました（全員出席）"
            );
          } else {
            delete savedSessionKeys[getSessionKey(cls)];
            delete savedSessionKeys[sessionKey];
            setSaveStateText("初期状態は全員出席です（未保存）");
          }

          renderLastSavedInfoBar(lastSavedInfo);

          renderClassList();
          loadRiskMapForCurrentSelection(cls, expectedGroup, students, riskCacheKey);
        })
        .withFailureHandler(function(error) {
          const currentSelectedKey = selectedClass ? getSessionKey(selectedClass) : "";
          const currentGroup = selectedClass
            ? (selectedGroupByClassCache[selectedClass.classId] || "")
            : "";

          if (
            requestToken !== detailRequestToken ||
            currentSelectedKey !== expectedSessionKey ||
            currentGroup !== expectedGroup
          ) {
            return;
          }

          document.getElementById("studentArea").innerHTML =
            '<div class="empty-box">名簿または保存済み出欠の読み込みに失敗しました。</div>';
          document.getElementById("summaryArea").innerHTML = "";
          document.getElementById("sortNote").textContent = "";
          setSaveButtonsDisabled(true);
          showMessage("名簿または保存済み出欠の読み込みに失敗しました", "error");
          console.error(error);
        })
        .getTeacherSessionDetailLight(cls.classId, cls.date, cls.period, expectedGroup);
    }

    function selectClass(cls) {
      debugLog("selectClass", cls);

      selectedClass = cls;
      renderClassList();
      renderSelectedClassInfo();
      clearMessage();

      if (!requiresGroupSelection(cls)) {
        updateGroupSelector(cls);
        selectedGroupByClassCache[cls.classId] = "";
        loadClassDetailWithGroup(cls, "");
        return;
      }

      const currentSessionKey = getSessionKey(cls);

      if (Object.prototype.hasOwnProperty.call(groupListByClassCache, cls.classId)) {
        updateGroupSelector(cls);

        const selectedGroup = selectedGroupByClassCache[cls.classId] || "";
        if (!selectedGroup) {
          document.getElementById("studentArea").innerHTML = '<div class="empty-box">班を選択すると学生一覧を表示します。</div>';
          document.getElementById("summaryArea").innerHTML = "";
          document.getElementById("sortNote").textContent = "";
          setSaveStateText("班を選択してください");
          setSaveButtonsDisabled(true);
          return;
        }

        loadClassDetailWithGroup(cls, selectedGroup);
        return;
      }

      const requestToken = ++groupListRequestToken;

      document.getElementById("studentArea").innerHTML = '<div class="empty-box">班一覧を読み込み中...</div>';
      document.getElementById("summaryArea").innerHTML = "";
      document.getElementById("sortNote").textContent = "";
      setSaveStateText("班一覧を読み込み中...");
      setSaveButtonsDisabled(true);

      google.script.run
        .withSuccessHandler(function(groups) {
          const currentSelectedKey = selectedClass ? getSessionKey(selectedClass) : "";

          if (
            requestToken !== groupListRequestToken ||
            currentSelectedKey !== currentSessionKey
          ) {
            return;
          }

          groupListByClassCache[cls.classId] = groups || [];
          updateGroupSelector(cls);

          const selectedGroup = selectedGroupByClassCache[cls.classId] || "";
          if (!selectedGroup) {
            document.getElementById("studentArea").innerHTML = '<div class="empty-box">班を選択すると学生一覧を表示します。</div>';
            document.getElementById("summaryArea").innerHTML = "";
            document.getElementById("sortNote").textContent = "";
            setSaveStateText("班を選択してください");
            setSaveButtonsDisabled(true);
            return;
          }

          loadClassDetailWithGroup(cls, selectedGroup);
        })
        .withFailureHandler(function(error) {
          const currentSelectedKey = selectedClass ? getSessionKey(selectedClass) : "";

          if (
            requestToken !== groupListRequestToken ||
            currentSelectedKey !== currentSessionKey
          ) {
            return;
          }

          showMessage("班一覧の読み込みに失敗しました", "error");
          console.error(error);
        })
        .getGroupsByClassId(cls.classId);
    }

    function buildAttendanceMapFromState() {
      const map = {};

      studentsCache.forEach(function(student) {
        const code = attendanceState[student.studentId] || "";
        if (code) {
          map[student.studentId] = code;
        }
      });

      return map;
    }

    function handleSaveClick() {
      if (!selectedClass || isSaving) return;

      const savingClass = selectedClass;
      const savingMode = currentMode;
      const savingGroup = requiresGroupSelection(savingClass)
        ? (selectedGroupByClassCache[savingClass.classId] || "")
        : "";

      const displaySessionKey = getSessionKey(savingClass);

      const sessionKey = savingGroup
        ? displaySessionKey + "__" + savingGroup
        : displaySessionKey;

      const studentCacheKey = savingGroup
        ? savingClass.classId + "__" + savingGroup
        : savingClass.classId;

      const riskCacheKey = savingGroup
        ? savingClass.classId + "__" + savingGroup
        : savingClass.classId;

      isSaving = true;
      markDirty(isDirty);
      showMessage("保存中です...", "warn");

      const payload = buildPayload(savingClass);
      const runner = google.script.run
        .withSuccessHandler(function(result) {
          isSaving = false;
          isDirty = false;

          attendanceMapCache[sessionKey] = buildAttendanceMapFromState();
          studentsByClassCache[studentCacheKey] = studentsCache;
          riskMapCache[riskCacheKey] = riskMapState;

          savingClass.isSaved = true;
          savingClass.lastSavedInfo = result && result.lastSavedInfo ? result.lastSavedInfo : null;

          savedSessionKeys[displaySessionKey] = true;
          savedSessionKeys[sessionKey] = true;

          renderClassList();
          renderLastSavedInfoBar(savingClass.lastSavedInfo);
          markDirty(false);
          setSaveStateText(savingMode === "past" ? "過去授業の修正を保存しました" : "保存しました");
          showMessage(savingMode === "past" ? "過去授業の修正を保存しました" : "保存しました", "success");
          console.log(result);
        })
        .withFailureHandler(function(error) {
          isSaving = false;
          markDirty(true);
          showMessage("保存に失敗しました", "error");
          console.error(error);
        });

      if (savingMode === "past") {
        runner.savePastAttendance(payload);
      } else {
        runner.saveAttendance(payload);
      }
    }

    function requiresGroupSelection(cls) {
      if (!cls) return false;
      return cls.subjectId === 'G1_G_工学実験実習1_FY' || cls.subjectId === 'G2_G_工学実験実習2_FY';
    }

    function updateGroupSelector(cls) {
      const area = document.getElementById("groupSelectorArea");
      const select = document.getElementById("groupSelect");

      if (!requiresGroupSelection(cls)) {
        area.style.display = "none";
        select.innerHTML = '<option value="">班を選択してください</option>';
        return;
      }

      area.style.display = "block";

      const groups = groupListByClassCache[cls.classId] || [];
      let html = '<option value="">班を選択してください</option>';
      groups.forEach(function(group) {
        const selected = selectedGroupByClassCache[cls.classId] === group ? ' selected' : '';
        html += '<option value="' + escapeHtml(group) + '"' + selected + '>' + escapeHtml(group) + '</option>';
      });
      select.innerHTML = html;
    }

    function loadTodayClasses(retryCount) {
      const attempt = Number(retryCount || 0);
      const requestToken = ++classListRequestToken;
      detailRequestToken++;
      groupListRequestToken++;

      debugLog("loadTodayClasses attempt", attempt);

  selectedClass = null;
  classesCache = [];
  isClassListLoading = true;
  studentsCache = [];
  attendanceState = {};
  riskMapState = {};
  isRiskLoading = false;

  savedSessionKeys = {};
  studentsByClassCache = {};
  attendanceMapCache = {};
  riskMapCache = {};
  selectedGroupByClassCache = {};
  groupListByClassCache = {};

  renderClassList();
  setLoadingDetail();
  setPastSearchLoading(false);

      google.script.run
        .withSuccessHandler(function(classes) {
          debugLog("loadTodayClasses raw classes", classes);

          if (requestToken !== classListRequestToken || currentMode !== "today") return;

          const normalizedClasses = Array.isArray(classes) ? classes : [];
          debugLog("loadTodayClasses normalized length", normalizedClasses.length);

          if (normalizedClasses.length === 0 && attempt < CLASS_LIST_EMPTY_RETRY_MAX) {
            debugLog("loadTodayClasses retry trigger", { attempt: attempt, nextAttempt: attempt + 1 });

            window.setTimeout(function() {
              if (requestToken !== classListRequestToken || currentMode !== "today") return;
              loadTodayClasses(attempt + 1);
            }, CLASS_LIST_EMPTY_RETRY_MS);
            return;
          }

          isClassListLoading = false;
          classesCache = normalizedClasses;
          debugLog("loadTodayClasses classesCache set", classesCache);

          if (!classesCache.length) {
            renderClassList();
            document.getElementById("selectedClassInfo").innerHTML = "今日の授業はありません。";
            document.getElementById("studentArea").innerHTML = '<div class="empty-box">出席入力の対象授業はありません。</div>';
            document.getElementById("sortNote").textContent = "";
            return;
          }

          renderClassList();

          const initialClass = chooseInitialClass(classesCache);
          debugLog("loadTodayClasses initialClass", initialClass);

          if (initialClass) {
            selectClass(initialClass);
          }
        })
        .withFailureHandler(function(error) {
          if (requestToken !== classListRequestToken || currentMode !== "today") return;

          isClassListLoading = false;
          document.getElementById("classListArea").innerHTML = '<div class="empty-box">授業情報の読み込みに失敗しました。</div>';
          document.getElementById("selectedClassInfo").innerHTML = "授業情報の読み込みに失敗しました。";
          document.getElementById("studentArea").innerHTML = '<div class="empty-box">読み込みに失敗しました。</div>';
          document.getElementById("sortNote").textContent = "";
          showMessage("授業情報の読み込みに失敗しました", "error");
          console.error(error);
        })
        .getTodayClassesForCurrentUser();
    }

    function loadPastClassesByDate(targetDate, retryCount) {
      const attempt = Number(retryCount || 0);
      const requestToken = ++classListRequestToken;
      detailRequestToken++;
      groupListRequestToken++;

      debugLog("loadPastClassesByDate targetDate", targetDate);
      debugLog("loadPastClassesByDate attempt", attempt);

      selectedClass = null;
      classesCache = [];
      isClassListLoading = true;
      studentsCache = [];
      attendanceState = {};
      riskMapState = {};
      isRiskLoading = false;

      savedSessionKeys = {};
      studentsByClassCache = {};
      attendanceMapCache = {};
      riskMapCache = {};
      selectedGroupByClassCache = {};
      groupListByClassCache = {};

      renderClassList();
      setLoadingDetail();
      savePastSearchDate(targetDate);
      setPastSearchLoading(true);

      google.script.run
        .withSuccessHandler(function(classes) {
          debugLog("loadPastClassesByDate raw classes", classes);

          if (requestToken !== classListRequestToken || currentMode !== "past") return;

          const normalizedClasses = Array.isArray(classes) ? classes : [];
          debugLog("loadPastClassesByDate normalized length", normalizedClasses.length);

          if (normalizedClasses.length === 0 && attempt < CLASS_LIST_EMPTY_RETRY_MAX) {
            debugLog("loadPastClassesByDate retry trigger", { attempt: attempt, nextAttempt: attempt + 1 });

            window.setTimeout(function() {
              if (requestToken !== classListRequestToken || currentMode !== "past") return;
              loadPastClassesByDate(targetDate, attempt + 1);
            }, CLASS_LIST_EMPTY_RETRY_MS);
            return;
          }

          classesCache = normalizedClasses;
          isClassListLoading = false;
          setPastSearchLoading(false);
          debugLog("loadPastClassesByDate classesCache set", classesCache);

          if (!classesCache.length) {
            renderClassList();
            document.getElementById("selectedClassInfo").innerHTML = "該当日の担当授業はありません。";
            document.getElementById("studentArea").innerHTML = '<div class="empty-box">修正対象の授業はありません。</div>';
            document.getElementById("sortNote").textContent = "";
            return;
          }

          renderClassList();
          selectClass(classesCache[0]);
        })
        .withFailureHandler(function(error) {
          if (requestToken !== classListRequestToken || currentMode !== "past") return;

          isClassListLoading = false;
          setPastSearchLoading(false);
          document.getElementById("classListArea").innerHTML = '<div class="empty-box">授業情報の読み込みに失敗しました。</div>';
          document.getElementById("selectedClassInfo").innerHTML = "授業情報の読み込みに失敗しました。";
          document.getElementById("studentArea").innerHTML = '<div class="empty-box">読み込みに失敗しました。</div>';
          document.getElementById("sortNote").textContent = "";
          showMessage("授業情報の読み込みに失敗しました", "error");
          console.error(error);
        })
        .getClassesForCurrentUserByDate(targetDate);
    }

    function initButtons() {
      const resetBtn = document.getElementById("resetPresentButton");
      const saveTopBtn = document.getElementById("saveButtonTop");
      const saveBottomBtn = document.getElementById("saveButtonBottom");
      const modeTodayBtn = document.getElementById("modeTodayBtn");
      const modePastBtn = document.getElementById("modePastBtn");
      const searchPastButton = document.getElementById("searchPastButton");
      const pastDateInput = document.getElementById("pastDateInput");

      if (resetBtn) {
        resetBtn.addEventListener("click", function() {
          if (!studentsCache || studentsCache.length === 0) return;

          studentsCache.forEach(function(student) {
            attendanceState[student.studentId] = "";
          });

          renderStudents();
          renderSummary();
          clearMessage();
          markDirty(true);
        });
      }

      if (saveTopBtn) saveTopBtn.addEventListener("click", handleSaveClick);
      if (saveBottomBtn) saveBottomBtn.addEventListener("click", handleSaveClick);

      if (modeTodayBtn) {
        modeTodayBtn.addEventListener("click", function() {
          if (isDirty) {
            const ok = window.confirm("保存されていない変更があります。切り替えますか？");
            if (!ok) return;
          }
          currentMode = "today";
          updateModeUI();
          clearMessage();
          loadTodayClasses();
        });
      }

      if (modePastBtn) {
        modePastBtn.addEventListener("click", function() {
          if (isDirty) {
            const ok = window.confirm("保存されていない変更があります。切り替えますか？");
            if (!ok) return;
          }
          currentMode = "past";
          updateModeUI();
          clearMessage();

          const savedDate = loadPastSearchDate();
          if (pastDateInput) {
            if (savedDate) {
              pastDateInput.value = savedDate;
            } else {
              const today = new Date();
              const yyyy = today.getFullYear();
              const mm = String(today.getMonth() + 1).padStart(2, "0");
              const dd = String(today.getDate()).padStart(2, "0");
              pastDateInput.value = yyyy + "-" + mm + "-" + dd;
            }
          }

          document.getElementById("quickClassNav").style.display = "none";
          document.getElementById("classListArea").innerHTML = '<div class="empty-box">日付を選択して検索してください。</div>';
          document.getElementById("selectedClassInfo").innerHTML = "過去授業を検索してください。";
          document.getElementById("studentArea").innerHTML = '<div class="empty-box">修正対象授業を選択すると学生一覧を表示します。</div>';
          document.getElementById("summaryArea").innerHTML = "";
          document.getElementById("sortNote").textContent = "";
          setSaveStateText("");
          setSaveButtonsDisabled(true);
        });
      }

      if (searchPastButton) {
        searchPastButton.addEventListener("click", function() {
          const value = pastDateInput ? pastDateInput.value : "";
          if (!value) {
            showMessage("検索日を選択してください", "warn");
            return;
          }
          savePastSearchDate(value);
          clearMessage();
          loadPastClassesByDate(value);
        });
      }

      if (pastDateInput) {
        pastDateInput.addEventListener("change", function() {
          savePastSearchDate(pastDateInput.value || "");
        });
      }

      const groupSelect = document.getElementById("groupSelect");
      if (groupSelect) {
        groupSelect.addEventListener("change", function() {
          if (!selectedClass) return;

          const nextGroup = groupSelect.value || "";

          if (isDirty) {
            const ok = window.confirm("保存されていない変更があります。班を切り替えますか？");
            if (!ok) {
              groupSelect.value = selectedGroupByClassCache[selectedClass.classId] || "";
              return;
            }
          }

          selectedGroupByClassCache[selectedClass.classId] = nextGroup;

          if (!nextGroup) {
            studentsCache = [];
            attendanceState = {};
            riskMapState = {};
            document.getElementById("studentArea").innerHTML = '<div class="empty-box">班を選択すると学生一覧を表示します。</div>';
            document.getElementById("summaryArea").innerHTML = "";
            document.getElementById("sortNote").textContent = "";
            setSaveStateText("班を選択してください");
            setSaveButtonsDisabled(true);
            return;
          }

          loadClassDetailWithGroup(selectedClass, nextGroup);
        });
      }
    }

    function chooseInitialClass(classes) {
      if (!classes || classes.length === 0) return null;

      if (preSelectedSession.classId) {
        const matched = classes.find(function(c) {
          return (
            c.classId === preSelectedSession.classId &&
            c.date === preSelectedSession.date &&
            String(c.period) === String(preSelectedSession.period)
          );
        });

        if (matched) return matched;
      }

      return classes[0];
    }

    function init() {
      debugLog("init start", {
        preSelectedSession: preSelectedSession,
        today: getTodayDateKeyJst()
      });

        initButtons();

      const linkedDate = (preSelectedSession && preSelectedSession.date) ? preSelectedSession.date : "";
      const todayYmd = getTodayDateKeyJst();

      if (linkedDate && linkedDate !== todayYmd) {
        currentMode = "past";
        updateModeUI();

        const pastDateInput = document.getElementById("pastDateInput");
        if (pastDateInput) {
          pastDateInput.value = linkedDate;
        }

        savePastSearchDate(linkedDate);
        loadPastClassesByDate(linkedDate);
        return;
      }

      currentMode = "today";
      updateModeUI();
      renderPageSubText();
      loadTodayClasses();
    }

    init();
  </script>
</body>
</html>
